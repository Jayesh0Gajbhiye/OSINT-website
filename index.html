<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WorldView OSINT - Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    // IMPORTANT: Get your free token at cesium.com/ion → Access Tokens → copy default one
    Cesium.Ion.defaultAccessToken = 'paste-your-real-token-here';  // <-- CHANGE THIS!

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      imageryProvider: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      timeline: false,
      fullscreenButton: false,
      vrButton: false
    });

    // Google's photoreal tiles (free tier works)
    async function loadPhotoreal() {
      try {
        const tileset = await Cesium.createGooglePhotorealistic3DTileset();
        viewer.scene.primitives.add(tileset);
        viewer.flyTo(tileset);
      } catch (err) {
        console.log('Tiles load error:', err);
      }
    }
    loadPhotoreal();

    // Fixed modern shader—no 'varying', uses 'in/out', texture() instead of texture2D
    viewer.scene.postProcessStages.add(new Cesium.PostProcessStage({
      fragmentShader: `
        uniform sampler2D colorTexture;
        in vec2 v_textureCoordinates;
        out vec4 fragColor;

        void main() {
          vec4 color = texture(colorTexture, v_textureCoordinates);
          // Basic scanline flicker for CRT feel
          float scan = sin(v_textureCoordinates.y * 800.0) * 0.08;
          color.rgb *= (0.92 + scan);
          fragColor = color;
        }
      `
    }));
  </script>
</body>
</html>

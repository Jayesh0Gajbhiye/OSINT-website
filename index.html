<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldView OSINT - TOP SECRET // NOFORN</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
    <script src="https://unpkg.com/satellite.js@4.1.1/dist/satellite.min.js"></script>
    <style>
      body { margin: 0; font-family: 'VT323', monospace; background: #000; color: #0f0; overflow: hidden; }
      #root { height: 100vh; position: relative; }
      #cesiumContainer { width: 100%; height: 100%; }
      .hud { position: absolute; pointer-events: none; z-index: 10; }
      #topbar { top: 8px; left: 50%; transform: translateX(-50%); font-size: 1.4em; text-shadow: 0 0 8px #0f0; background: rgba(0,0,0,0.7); padding: 4px 12px; border: 1px solid #0f0; }
      #sidebar { left: 12px; top: 60px; width: 280px; background: rgba(0,0,0,0.6); padding: 12px; border: 1px solid #0f0; }
      #params { right: 12px; top: 60px; width: 220px; background: rgba(0,0,0,0.6); padding: 12px; border: 1px solid #0f0; }
      button, select, input { background: #000; color: #0f0; border: 1px solid #0f0; font-family: inherit; cursor: pointer; margin: 2px; }
      input[type=range] { width: 100%; }
      .scanline { position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,0,0.06) 2px, rgba(0,255,0,0.06) 4px); animation: scan 8s linear infinite; z-index: 5; }
      @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
      .preset-btn { background: #0f0; color: #000; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <div class="scanline" id="scanOverlay"></div>
  </body>
</html>

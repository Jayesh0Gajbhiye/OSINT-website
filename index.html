<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WorldView OSINT Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <script>
    // YOUR TOKEN HERE—paste the long eyJ... string from Cesium ion
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzZjgyMzUyOC0wOGZmLTQ3ODYtYmEyMi03MzJmY2NlNzRjZWMiLCJpZCI6Mzk3ODUwLCJpYXQiOjE3NzI2MTk4ODB9.Dw4OwCm6QyXl0jY5FXbogc-WlxGav8GtWP-1ArikgOE';

    // Create the viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),  // real hills
      imageryProvider: false,                      // no flat map
      baseLayerPicker: false,                      // hide picker
      geocoder: Cesium.IonGeocodeProviderType.GOOGLE,  // city search
      fullscreenButton: false                      // optional
    });

    // Add photorealistic 3D buildings—like Google Earth
    async function addPhotoreal() {
      try {
        const tileset = await Cesium.createGooglePhotorealistic3DTileset();
        viewer.scene.primitives.add(tileset);
        // Auto-zoom to a nice spot (you can change coords)
        viewer.zoomTo(tileset);
      } catch (err) {
        console.log('Photoreal load issue:', err);
      }
    }
    addPhotoreal();

    // Start zoomed in somewhere cool—edit degrees if you want
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(-74.0, 40.7, 15000)  // NYC view
    });
  </script>
</body>
</html>

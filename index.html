<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WorldView OSINT - Globe</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    // REPLACE THIS WITH YOUR REAL TOKEN FROM cesium.com/ion
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJ5b3VyLXRva2VuLWhlcmUiLCJpZCI6IjEiLCJpYXQiOjE3MjAwMDAwMDB9.your-signature-here';  // <-- paste yours!

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      imageryProvider: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      timeline: false,
      fullscreenButton: false,
      vrButton: false
    });

    // Load Google's photoreal 3D tiles
    async function loadPhotoreal() {
      try {
        const tileset = await Cesium.createGooglePhotorealistic3DTileset();
        viewer.scene.primitives.add(tileset);
        viewer.flyTo(tileset, { offset: new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-45), 1000000) });
      } catch (err) {
        console.error('Photoreal tiles failed:', err);
      }
    }
    loadPhotoreal();

    // Fixed CRT scanline shader (no 'varying'—uses 'in' for modern GLSL)
    viewer.scene.postProcessStages.add(new Cesium.PostProcessStage({
      fragmentShader: `
        uniform sampler2D colorTexture;
        in vec2 v_textureCoordinates;
        out vec4 out_FragColor;

        void main() {
          vec4 color = texture(colorTexture, v_textureCoordinates);
          // Simple scanline effect—feel free to tweak
          float scanline = sin(v_textureCoordinates.y * 800.0) * 0.1;
          color.rgb *= (0.9 + scanline);
          out_FragColor = color;
        }
      `
    }));
  </script>
</body>
</html>
